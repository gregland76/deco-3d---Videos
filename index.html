<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mur Video des Matieres</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="hero-copy">
          <span class="eyebrow">Bibliotheque video 3D</span>
          <h1>Choisir une matiere devient immediat.</h1>
          <p class="subtitle">
            Recherche rapide, categories visibles, sections repliables et ouverture grand format en un clic.
            <strong>Les apercus se lancent au survol.</strong>
          </p>
        </div>

        <section class="hero-stats" aria-label="Resume du catalogue">
          <article class="stat">
            <span class="stat-label">Matieres visibles</span>
            <strong class="stat-value" id="visibleMaterialsCount">0</strong>
          </article>
          <article class="stat">
            <span class="stat-label">Categories actives</span>
            <strong class="stat-value" id="visibleCategoriesCount">0</strong>
          </article>
          <article class="stat">
            <span class="stat-label">Catalogue total</span>
            <strong class="stat-value" id="totalMaterialsCount">0</strong>
          </article>
        </section>
      </header>

      <section class="controls" aria-label="Filtres d exploration">
        <div class="controls-top">
          <label class="search" for="searchInput">
            <input id="searchInput" type="search" placeholder="Rechercher une matiere, une categorie ou un groupe" autocomplete="off" />
          </label>

          <div class="actions" aria-label="Actions globales">
            <button class="ghost-button" id="toggleCollapseButton" type="button">Tout replier</button>
            <button class="ghost-button" id="resetFiltersButton" type="button">Reinitialiser</button>
          </div>
        </div>

        <div class="filters" id="categoryFilters" aria-label="Filtres par categorie"></div>

        <div class="results-bar">
          <div class="results-copy">
            <span class="results-count" id="resultsCountLabel">0 resultats</span>
            <span id="resultsHint">Toutes les categories</span>
          </div>
        </div>
      </section>

      <section class="board" id="materialsBoard" aria-label="Categories et matieres"></section>
    </main>

    <div class="viewer-overlay" id="viewerOverlay" aria-hidden="true">
      <div class="viewer-dialog" role="dialog" aria-modal="true" aria-labelledby="viewerTitle">
        <div class="viewer-head">
          <h2 class="viewer-title" id="viewerTitle"></h2>
          <button class="viewer-close" id="viewerClose" type="button" aria-label="Fermer">&#x2715;</button>
        </div>
        <div class="viewer-media" id="viewerMedia">
          <div class="viewer-loading" id="viewerLoading" hidden aria-hidden="true">
            <span class="viewer-loading-spinner" aria-label="Chargement"></span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
