<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mur Video des Matieres</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap");

      :root {
        --bg-a: #f2eadf;
        --bg-b: #d8e4dc;
        --ink: #1f2623;
        --muted: #4d5f58;
        --card-bg: rgba(255, 253, 248, 0.8);
        --card-border: rgba(31, 38, 35, 0.14);
        --accent: #1f6a52;
        --shadow: 0 12px 28px rgba(22, 30, 27, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 14% 8%, rgba(206, 126, 58, 0.2) 0%, rgba(206, 126, 58, 0) 38%),
          radial-gradient(circle at 84% 18%, rgba(31, 106, 82, 0.2) 0%, rgba(31, 106, 82, 0) 42%),
          linear-gradient(145deg, var(--bg-a), var(--bg-b));
      }

      .page {
        width: min(1800px, 100% - 24px);
        margin: 12px auto 16px;
        display: grid;
        gap: 10px;
      }

      .head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--card-border);
        background: var(--card-bg);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0;
        font-family: "Fraunces", Georgia, serif;
        font-size: clamp(28px, 4.6vw, 46px);
        line-height: 0.95;
        letter-spacing: -0.03em;
      }

      .subtitle {
        margin: 0;
        font-size: 13px;
        color: var(--muted);
      }

      .subtitle strong {
        color: var(--accent);
      }

      .board {
        display: grid;
        gap: 16px;
      }

      .category {
        display: grid;
        gap: 10px;
        padding: 0;
        border-radius: 16px;
        border: 1px solid rgba(31, 106, 82, 0.35);
        background: linear-gradient(180deg, rgba(31, 106, 82, 0.1), rgba(255, 255, 255, 0.7));
        box-shadow: 0 14px 30px rgba(22, 30, 27, 0.14);
        overflow: hidden;
      }

      .category-title {
        margin: 0;
        font-size: 15px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #f4fbf7;
      }

      .category-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 12px 14px;
        background: linear-gradient(120deg, #195c48, #2f7c63);
      }

      .category-count,
      .subgroup-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 28px;
        height: 24px;
        padding: 0 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .category-count {
        color: #1f4236;
        background: #d5efe5;
      }

      .subgroups {
        display: grid;
        gap: 10px;
        padding: 10px;
      }

      .subgroup {
        display: grid;
        gap: 8px;
        padding: 0;
        border-radius: 12px;
        border: 1px solid rgba(31, 38, 35, 0.2);
        background: rgba(255, 255, 255, 0.82);
        overflow: hidden;
      }

      .subgroup-title {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #2d3f38;
      }

      .subgroup-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        background: rgba(31, 106, 82, 0.14);
        border-bottom: 1px solid rgba(31, 38, 35, 0.12);
      }

      .subgroup-count {
        color: #214f3f;
        background: rgba(255, 255, 255, 0.88);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 10px;
        padding: 8px;
      }

      .tile {
        display: grid;
        gap: 7px;
        padding: 8px;
        border-radius: 14px;
        border: 1px solid var(--card-border);
        background: var(--card-bg);
        box-shadow: 0 8px 20px rgba(22, 30, 27, 0.12);
      }

      .tile-name {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.2;
      }

      .media {
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid rgba(31, 38, 35, 0.14);
        background: #101614;
        aspect-ratio: 16 / 9;
        position: relative;
      }

      .media-thumb {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(0.92) contrast(1.05);
      }

      .media iframe {
        width: 100%;
        height: 100%;
        border: 0;
        pointer-events: none;
        display: block;
      }

      .tile-name {
        cursor: pointer;
      }

      .tile-name:hover {
        color: var(--accent);
      }

      .viewer-overlay {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(11, 16, 14, 0.8);
        backdrop-filter: blur(6px);
      }

      .viewer-overlay.is-open {
        display: flex;
      }

      .viewer-dialog {
        width: min(1200px, 100%);
        display: grid;
        gap: 10px;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(18, 24, 22, 0.95);
      }

      .viewer-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: #f5f7f5;
      }

      .viewer-title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
      }

      .viewer-close {
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: rgba(255, 255, 255, 0.08);
        color: #f5f7f5;
        border-radius: 10px;
        padding: 6px 10px;
        cursor: pointer;
      }

      .viewer-close:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      .viewer-media {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        overflow: hidden;
        background: #000;
      }

      .viewer-media iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      @media (max-width: 640px) {
        .page {
          width: min(1800px, 100% - 12px);
          margin: 8px auto 12px;
        }

        .head {
          flex-direction: column;
          align-items: flex-start;
          gap: 6px;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 8px;
        }

        .tile {
          padding: 6px;
          gap: 5px;
        }

        .tile-name {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="head">
        <h1>Mur Video des Matieres</h1>
        <p class="subtitle">Toutes les vignettes sont visibles et animees en meme temps. <strong>Chargement optimise par lots.</strong></p>
      </header>

      <section class="board" id="materialsBoard" aria-label="Categories et matieres"></section>
    </main>

    <div class="viewer-overlay" id="viewerOverlay" aria-hidden="true">
      <div class="viewer-dialog" role="dialog" aria-modal="true" aria-labelledby="viewerTitle">
        <div class="viewer-head">
          <h2 class="viewer-title" id="viewerTitle"></h2>
          <button class="viewer-close" id="viewerClose" type="button">Fermer</button>
        </div>
        <div class="viewer-media" id="viewerMedia"></div>
      </div>
    </div>

    <script type="module">
      const randomVideoIds = [
        "aqz-KE-bpKQ",
        "dQw4w9WgXcQ",
        "9bZkp7q19f0",
        "fJ9rUzIMcZQ",
        "CevxZvSJLk8",
        "L_jWHffIx5E",
        "kJQP7kiw5Fk",
        "OPf0YbXqDm0",
        "M7lc1UVf-VE",
        "ScMzIvxBSi4",
        "ysz5S6PUM-U",
      ];

      const materials = [
        { id: "walls-silex", category: "Murs", subgroup: "Mineraux", name: "Silex" },
        { id: "walls-briques", category: "Murs", subgroup: "Mineraux", name: "Briques" },
        { id: "walls-pierre-calcaire-taille", category: "Murs", subgroup: "Mineraux", name: "Pierre calcaire taillee" },
        { id: "walls-moellon-calcaire", category: "Murs", subgroup: "Mineraux", name: "Moellon calcaire" },
        { id: "walls-ardoise", category: "Murs", subgroup: "Mineraux", name: "Ardoise" },
        { id: "walls-colombage", category: "Murs", subgroup: "Bois", name: "Colombage" },
        { id: "walls-bardeaux", category: "Murs", subgroup: "Bois", name: "Bardeaux" },
        { id: "walls-tuile-sable", category: "Murs", subgroup: "Tuile de pays", name: "Tuile de pays - sable champagne" },
        { id: "walls-tuile-rouge", category: "Murs", subgroup: "Tuile de pays", name: "Tuile de pays - rouge vieilli" },
        { id: "walls-tuile-brun", category: "Murs", subgroup: "Tuile de pays", name: "Tuile de pays - brun vieilli" },
        { id: "walls-chaume", category: "Murs", subgroup: "Vegetal", name: "Chaume" },

        { id: "floors-parquet", category: "Sols", subgroup: "Bois", name: "Parquet bois" },

        { id: "roof-ardoise", category: "Couverture", subgroup: "Mineraux", name: "Ardoise" },
        { id: "roof-tuile-sable", category: "Couverture", subgroup: "Tuile de pays", name: "Tuile de pays - sable champagne" },
        { id: "roof-tuile-rouge", category: "Couverture", subgroup: "Tuile de pays", name: "Tuile de pays - rouge vieilli" },
        { id: "roof-tuile-brun", category: "Couverture", subgroup: "Tuile de pays", name: "Tuile de pays - brun vieilli" },
        { id: "roof-chaume", category: "Couverture", subgroup: "Vegetal", name: "Chaume" },
        { id: "roof-bois", category: "Couverture", subgroup: "Bois", name: "Bois couverture" },
        { id: "roof-bardeaux", category: "Couverture", subgroup: "Bois", name: "Bardeaux" },

        { id: "linteau-bois", category: "Linteaux", subgroup: "Structure", name: "Linteau bois" },
        { id: "linteau-pierre", category: "Linteaux", subgroup: "Structure", name: "Linteau pierre" },
        { id: "linteau-brique", category: "Linteaux", subgroup: "Structure", name: "Linteau brique" },
        { id: "linteau-ipn", category: "Linteaux", subgroup: "Structure", name: "Linteau IPN" },

        { id: "menuiserie-bois-naturel", category: "Menuiseries", subgroup: "Bois naturel", name: "Bois naturel" },
        { id: "menuiserie-bois-peint-bleu", category: "Menuiseries", subgroup: "Bois peint", name: "Bois peint - bleu" },
        { id: "menuiserie-bois-peint-rouge", category: "Menuiseries", subgroup: "Bois peint", name: "Bois peint - rouge" },
        { id: "menuiserie-bois-peint-vert", category: "Menuiseries", subgroup: "Bois peint", name: "Bois peint - vert" },
        { id: "menuiserie-bois-peint-beige", category: "Menuiseries", subgroup: "Bois peint", name: "Bois peint - beige" },
        { id: "menuiserie-alu-brut", category: "Menuiseries", subgroup: "Aluminium", name: "Aluminium brut" },
        { id: "menuiserie-alu-teinte-bleu", category: "Menuiseries", subgroup: "Aluminium teinte", name: "Aluminium teinte - bleu" },
        { id: "menuiserie-alu-teinte-rouge", category: "Menuiseries", subgroup: "Aluminium teinte", name: "Aluminium teinte - rouge" },
        { id: "menuiserie-alu-teinte-vert", category: "Menuiseries", subgroup: "Aluminium teinte", name: "Aluminium teinte - vert" },
        { id: "menuiserie-alu-teinte-beige", category: "Menuiseries", subgroup: "Aluminium teinte", name: "Aluminium teinte - beige" },
      ];

      const board = document.getElementById("materialsBoard");
      const viewerOverlay = document.getElementById("viewerOverlay");
      const viewerMedia = document.getElementById("viewerMedia");
      const viewerTitle = document.getElementById("viewerTitle");
      const viewerClose = document.getElementById("viewerClose");
      const thumbnailQueue = [];
      let queueTimer = null;
      let queueIndex = 0;

      function pickRandomVideoId() {
        const index = Math.floor(Math.random() * randomVideoIds.length);
        return randomVideoIds[index];
      }

      function buildVideoUrl(videoId) {
        return `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}&controls=0&modestbranding=1&rel=0&playsinline=1`;
      }

      function buildThumbUrl(videoId) {
        return `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
      }

      function hydrateTileVideo(tile, videoUrl, title) {
        if (!tile || tile.dataset.hydrated === "1") {
          return;
        }

        const media = tile.querySelector(".media");
        if (!media) {
          return;
        }

        const iframe = document.createElement("iframe");
        iframe.title = title;
        iframe.src = videoUrl;
        iframe.loading = "lazy";
        iframe.allow = "autoplay; encrypted-media; picture-in-picture";
        iframe.allowFullscreen = true;

        media.innerHTML = "";
        media.appendChild(iframe);
        tile.dataset.hydrated = "1";
      }

      function startProgressiveHydration() {
        const FIRST_BATCH_COUNT = 8;
        const BATCH_INTERVAL_MS = 250;

        thumbnailQueue.slice(0, FIRST_BATCH_COUNT).forEach((entry) => {
          hydrateTileVideo(entry.tile, entry.videoUrl, entry.title);
        });
        queueIndex = FIRST_BATCH_COUNT;

        if (queueTimer) {
          clearInterval(queueTimer);
        }

        queueTimer = setInterval(() => {
          const entry = thumbnailQueue[queueIndex];
          if (!entry) {
            clearInterval(queueTimer);
            queueTimer = null;
            return;
          }

          hydrateTileVideo(entry.tile, entry.videoUrl, entry.title);
          queueIndex += 1;
        }, BATCH_INTERVAL_MS);
      }

      function createTile(material) {
        const videoId = pickRandomVideoId();
        const videoUrl = buildVideoUrl(videoId);
        const tile = document.createElement("article");
        tile.className = "tile";
        tile.innerHTML = `
          <p class="tile-name" data-open-viewer="true" tabindex="0">${material.name}</p>
          <div class="media">
            <img class="media-thumb" alt="Miniature ${material.name}" src="${buildThumbUrl(videoId)}" loading="lazy" referrerpolicy="no-referrer" />
          </div>
        `;

        const nameEl = tile.querySelector("[data-open-viewer='true']");
        function openViewer() {
          viewerTitle.textContent = `${material.category} - ${material.name}`;
          viewerMedia.innerHTML = `
            <iframe
              title="${material.name} grand format"
              src="${videoUrl}"
              allow="autoplay; encrypted-media; picture-in-picture"
              allowfullscreen
            ></iframe>
          `;
          viewerOverlay.classList.add("is-open");
          viewerOverlay.setAttribute("aria-hidden", "false");
          document.body.style.overflow = "hidden";
        }

        nameEl.addEventListener("click", openViewer);
        nameEl.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openViewer();
          }
        });

        thumbnailQueue.push({
          tile,
          videoUrl,
          title: material.name,
        });

        return tile;
      }

      function closeViewer() {
        viewerOverlay.classList.remove("is-open");
        viewerOverlay.setAttribute("aria-hidden", "true");
        viewerMedia.innerHTML = "";
        document.body.style.overflow = "";
      }

      function renderBoard() {
        const categories = Array.from(new Set(materials.map((item) => item.category)));
        categories.forEach((category) => {
          const itemsInCategory = materials.filter((item) => item.category === category);
          const categoryEl = document.createElement("section");
          categoryEl.className = "category";
          categoryEl.innerHTML = `<div class="category-head"><h2 class="category-title">${category}</h2><span class="category-count">${itemsInCategory.length}</span></div><div class="subgroups"></div>`;
          const subgroupsWrap = categoryEl.querySelector(".subgroups");
          const subgroups = Array.from(new Set(itemsInCategory.map((item) => item.subgroup || "Autres")));

          subgroups.forEach((subgroup) => {
            const subgroupEl = document.createElement("section");
            subgroupEl.className = "subgroup";
            const subgroupItems = itemsInCategory.filter((item) => (item.subgroup || "Autres") === subgroup);
            subgroupEl.innerHTML = `<div class="subgroup-head"><h3 class="subgroup-title">${subgroup}</h3><span class="subgroup-count">${subgroupItems.length}</span></div><div class="grid"></div>`;
            const subgroupGrid = subgroupEl.querySelector(".grid");

            subgroupItems.forEach((item) => subgroupGrid.appendChild(createTile(item)));

            subgroupsWrap.appendChild(subgroupEl);
          });

          board.appendChild(categoryEl);
        });
      }

      renderBoard();
      startProgressiveHydration();

      viewerClose.addEventListener("click", closeViewer);
      viewerOverlay.addEventListener("click", (event) => {
        if (event.target === viewerOverlay) {
          closeViewer();
        }
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && viewerOverlay.classList.contains("is-open")) {
          closeViewer();
        }
      });
    </script>
  </body>
</html>
